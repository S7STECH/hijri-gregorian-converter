<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>
محول التاريخ الهجري والميلادي
</title>

<link rel="preconnect"
      href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap"
      rel="stylesheet">

<style>

/* نفس التصميم */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Cairo',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    color:white;
}

.container{
    width:100%;
    max-width:950px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(16px);
    border-radius:28px;
    padding:35px;
    box-shadow:0 15px 40px rgba(0,0,0,0.45);
}

.title{
    text-align:center;
    font-size:34px;
    font-weight:700;
    margin-bottom:35px;
}

.row{
    display:flex;
    gap:25px;
    flex-wrap:wrap;
}

.box{
    flex:1;
    min-width:300px;
}

label{
    display:block;
    margin-bottom:14px;
    font-size:20px;
    font-weight:700;
}

.date-inputs{
    display:flex;
    gap:10px;
}

.date-inputs input{
    flex:1;
    width:100%;
    padding:16px;
    border:none;
    border-radius:16px;
    outline:none;
    text-align:center;
    font-size:18px;
    font-weight:600;
    background:white;
    color:#111;
}

.buttons{
    margin-top:30px;
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

button{
    flex:1;
    padding:16px;
    border:none;
    border-radius:16px;
    font-size:19px;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
}

.btn1{background:#22c55e;color:white;}
.btn2{background:#3b82f6;color:white;}
.btn3{background:#f59e0b;color:white;}

button:hover{
    transform:translateY(-3px);
    opacity:0.92;
}

.result{
    margin-top:30px;
    background:rgba(255,255,255,0.08);
    border-radius:22px;
    padding:28px;
    text-align:center;
}

.result h2{
    margin-bottom:18px;
    font-size:26px;
}

.result p{
    font-size:24px;
    line-height:2;
    font-weight:700;
}

.footer{
    margin-top:28px;
    text-align:center;
    font-size:16px;
    opacity:0.85;
}

@media(max-width:768px){
    .container{padding:22px;}
    .title{font-size:28px;}
    .row{flex-direction:column;}
    .box{min-width:100%;}
    .date-inputs input{padding:14px;font-size:16px;}
    button{font-size:17px;}
    .result p{font-size:19px;}
}

</style>

</head>

<body>

<div class="container">

    <div class="title">
        محول التاريخ الهجري والميلادي
    </div>

    <div class="row">

        <div class="box">
            <label>التاريخ الميلادي</label>
            <div class="date-inputs">
                <input id="gDay" placeholder="اليوم">
                <input id="gMonth" placeholder="الشهر">
                <input id="gYear" placeholder="السنة">
            </div>
        </div>

        <div class="box">
            <label>التاريخ الهجري</label>
            <div class="date-inputs">
                <input id="hDay" placeholder="اليوم">
                <input id="hMonth" placeholder="الشهر">
                <input id="hYear" placeholder="السنة">
            </div>
        </div>

    </div>

    <div class="buttons">

        <button class="btn1" onclick="convertToHijri()">تحويل إلى هجري</button>
        <button class="btn2" onclick="convertToGregorian()">تحويل إلى ميلادي</button>
        <button class="btn3" onclick="copyResult()">نسخ النتيجة</button>

    </div>

    <div class="result">

        <h2>النتيجة</h2>

        <p id="resultText">اختر التاريخ ثم اضغط تحويل</p>

    </div>

    <div class="footer">
        إعداد التقني حسين بن سعيد | s7s_tec
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/moment@2.29.4/moment.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/moment-hijri@2.1.2/moment-hijri.js"></script>

<script>

/* تحويل أم القرى (API) */
async function umAlQura(type,y,m,d){

    try{

        let url = (type==="gToH")
        ? `https://api.aladhan.com/v1/gToH?date=${d}-${m}-${y}`
        : `https://api.aladhan.com/v1/hToG?date=${d}-${m}-${y}`;

        let res = await fetch(url);
        let data = await res.json();

        return data.data || null;

    }catch(e){
        return null;
    }
}

/* ميلادي → هجري */
async function convertToHijri(){

    let d=gDay.value, m=gMonth.value, y=gYear.value;

    if(!d||!m||!y){alert("أدخل التاريخ كاملاً");return;}

    let api = await umAlQura("gToH",y,m,d);

    let hd,hm,hy;

    if(api){
        hd=api.hijri.day;
        hm=api.hijri.month.number;
        hy=api.hijri.year;
    }else{
        let g=moment(`${y}-${m}-${d}`,"YYYY-MM-DD");
        hd=g.format("iDD");
        hm=g.format("iMM");
        hy=g.format("iYYYY");
    }

    hDay.value=hd;
    hMonth.value=hm;
    hYear.value=hy;

    resultText.innerHTML =
    `الميلادي: ${d}-${m}-${y}<br><br>الهجري: ${hd}-${hm}-${hy}`;
}

/* هجري → ميلادي */
async function convertToGregorian(){

    let d=hDay.value, m=hMonth.value, y=hYear.value;

    if(!d||!m||!y){alert("أدخل التاريخ كاملاً");return;}

    let api = await umAlQura("hToG",y,m,d);

    let gd,gm,gy;

    if(api){
        gd=api.gregorian.day;
        gm=api.gregorian.month.number;
        gy=api.gregorian.year;
    }else{
        let h=moment(`${y}-${m}-${d}`,"iYYYY-iMM-iDD");
        gd=h.format("DD");
        gm=h.format("MM");
        gy=h.format("YYYY");
    }

    gDay.value=gd;
    gMonth.value=gm;
    gYear.value=gy;

    resultText.innerHTML =
    `الهجري: ${d}-${m}-${y}<br><br>الميلادي: ${gd}-${gm}-${gy}`;
}

/* 📋 نسخ النتيجة */
function copyResult(){

    let text = document.getElementById("resultText").innerText;

    if(!text || text.includes("اختر")){
        alert("لا يوجد نتيجة للنسخ");
        return;
    }

    navigator.clipboard.writeText(text)
    .then(()=>alert("تم النسخ ✔️"))
    .catch(()=>{

        let t=document.createElement("textarea");
        t.value=text;
        document.body.appendChild(t);
        t.select();
        document.execCommand("copy");
        document.body.removeChild(t);

        alert("تم النسخ ✔️");
    });
}

</script>

</body>
</html>
