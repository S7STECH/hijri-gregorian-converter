<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>محول التاريخ - أم القرى</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<!-- PWA -->
<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/moment@2.29.4/moment.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/moment-hijri@2.1.2/moment-hijri.js"></script>

<style>

:root{
--bg:#0f172a;
--card:rgba(255,255,255,0.08);
--text:white;
--btn:#22c55e;
}

.light{
--bg:#f1f5f9;
--card:white;
--text:#111;
--btn:#16a34a;
}

body{
margin:0;
font-family:'Cairo';
background:var(--bg);
color:var(--text);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
transition:0.3s;
}

.app{
width:100%;
max-width:900px;
background:var(--card);
backdrop-filter:blur(16px);
border-radius:20px;
padding:25px;
}

h1{
text-align:center;
margin-bottom:15px;
}

.topbar{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

button{
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.box{
padding:15px;
background:rgba(255,255,255,0.06);
border-radius:15px;
}

input{
width:100%;
padding:10px;
margin-top:5px;
border-radius:10px;
border:none;
text-align:center;
}

.actions{
display:flex;
gap:10px;
margin-top:15px;
flex-wrap:wrap;
}

.actions button{
flex:1;
}

.primary{background:#22c55e;color:white;}
.blue{background:#3b82f6;color:white;}
.darkbtn{background:#111;color:white;}

.result{
margin-top:15px;
padding:15px;
background:rgba(255,255,255,0.08);
border-radius:15px;
}

</style>
</head>

<body>

<div class="app">

<div class="topbar">
<h3>محول التاريخ (أم القرى)</h3>
<button onclick="toggleTheme()">🌙/☀️</button>
</div>

<div class="grid">

<div class="box">
<h4>ميلادي</h4>
<input id="gDay" placeholder="يوم">
<input id="gMonth" placeholder="شهر">
<input id="gYear" placeholder="سنة">
</div>

<div class="box">
<h4>هجري</h4>
<input id="hDay" placeholder="يوم">
<input id="hMonth" placeholder="شهر">
<input id="hYear" placeholder="سنة">
</div>

</div>

<div class="actions">

<button class="primary" onclick="toHijri()">تحويل هجري</button>
<button class="blue" onclick="toGregorian()">تحويل ميلادي</button>
<button class="darkbtn" onclick="shareX()">X</button>
<button class="darkbtn" onclick="shareWhats()">WhatsApp</button>

</div>

<div class="result" id="result">
النتيجة ستظهر هنا
</div>

</div>

<script>

// 🌙 وضع داكن/فاتح
function toggleTheme(){
document.body.classList.toggle("light");
}

// 📅 تاريخ اليوم تلقائي
window.onload = function(){
let now = new Date();
document.getElementById("gDay").value = now.getDate();
document.getElementById("gMonth").value = now.getMonth()+1;
document.getElementById("gYear").value = now.getFullYear();
}

// 🔁 ميلادي → هجري (أم القرى عبر moment-hijri)
function toHijri(){

let d=document.getElementById("gDay").value;
let m=document.getElementById("gMonth").value;
let y=document.getElementById("gYear").value;

let date = moment(`${y}-${m}-${d}`,"YYYY-MM-DD");

let h = date.format("iYYYY/iMM/iDD");

document.getElementById("hDay").value = h.split("/")[2];
document.getElementById("hMonth").value = h.split("/")[1];
document.getElementById("hYear").value = h.split("/")[0];

document.getElementById("result").innerHTML =
`الميلادي: ${d}-${m}-${y}<br>الهجري: ${h}`;
}

// 🔁 هجري → ميلادي
function toGregorian(){

let d=document.getElementById("hDay").value;
let m=document.getElementById("hMonth").value;
let y=document.getElementById("hYear").value;

let date = moment(`${y}-${m}-${d}`,"iYYYY-iMM-iDD");

let g = date.format("YYYY-MM-DD");

document.getElementById("result").innerHTML =
`الهجري: ${d}-${m}-${y}<br>الميلادي: ${g}`;
}

// 📤 مشاركة X
function shareX(){
let text=document.getElementById("result").innerText;
let url="https://twitter.com/intent/tweet?text="+encodeURIComponent(text);
window.open(url,"_blank");
}

// 📲 مشاركة WhatsApp
function shareWhats(){
let text=document.getElementById("result").innerText;
let url="https://wa.me/?text="+encodeURIComponent(text);
window.open(url,"_blank");
}

</script>

</body>
</html>
