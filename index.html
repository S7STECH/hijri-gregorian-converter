<script>

function formatDate(day, month, year) {
    day = String(day).padStart(2, '0');
    month = String(month).padStart(2, '0');
    return `${day}-${month}-${year}`;
}

/* تحقق من صحة الإدخال */
function validate(day, month, year, type) {

    day = parseInt(day);
    month = parseInt(month);
    year = parseInt(year);

    if (isNaN(day) || isNaN(month) || isNaN(year)) {
        alert("أدخل تاريخ صحيح");
        return false;
    }

    if (month < 1 || month > 12) {
        alert("الشهر غير صحيح");
        return false;
    }

    if (day < 1 || day > 31) {
        alert("اليوم غير صحيح");
        return false;
    }

    if (year < 1) {
        alert("السنة غير صحيحة");
        return false;
    }

    return true;
}

/* ميلادي → هجري */
function convertToHijri() {

    let day = document.getElementById("gDay").value.trim();
    let month = document.getElementById("gMonth").value.trim();
    let year = document.getElementById("gYear").value.trim();

    if (!validate(day, month, year, "gregorian")) return;

    day = String(day).padStart(2, '0');
    month = String(month).padStart(2, '0');

    const gregorianDate = `${year}-${month}-${day}`;

    const gDate = moment(gregorianDate, "YYYY-MM-DD", true);

    if (!gDate.isValid()) {
        alert("التاريخ الميلادي غير صحيح");
        return;
    }

    const hDay = gDate.format("iDD");
    const hMonth = gDate.format("iMM");
    const hYear = gDate.format("iYYYY");

    document.getElementById("hDay").value = hDay;
    document.getElementById("hMonth").value = hMonth;
    document.getElementById("hYear").value = hYear;

    document.getElementById("resultText").innerHTML = `
        الميلادي: ${formatDate(day, month, year)}
        <br><br>
        الهجري: ${formatDate(hDay, hMonth, hYear)}
    `;
}

/* هجري → ميلادي (الإصلاح المهم هنا) */
function convertToGregorian() {

    let day = document.getElementById("hDay").value.trim();
    let month = document.getElementById("hMonth").value.trim();
    let year = document.getElementById("hYear").value.trim();

    if (!validate(day, month, year, "hijri")) return;

    day = String(day).padStart(2, '0');
    month = String(month).padStart(2, '0');

    const hijriDate = `${year}-${month}-${day}`;

    // ✅ الإصلاح الحقيقي هنا
    const gDate = moment(hijriDate, "iYYYY-iMM-iDD").locale('en');

    if (!gDate.isValid()) {
        alert("التاريخ الهجري غير صحيح");
        return;
    }

    const gDay = gDate.format("DD");
    const gMonth = gDate.format("MM");
    const gYear = gDate.format("YYYY");

    document.getElementById("gDay").value = gDay;
    document.getElementById("gMonth").value = gMonth;
    document.getElementById("gYear").value = gYear;

    document.getElementById("resultText").innerHTML = `
        الهجري: ${formatDate(day, month, year)}
        <br><br>
        الميلادي: ${formatDate(gDay, gMonth, gYear)}
    `;
}

</script>
