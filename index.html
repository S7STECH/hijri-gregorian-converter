<style>
.converter-container{
    max-width:700px;
    margin:auto;
    padding:20px;
}

.date-row{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.date-box{
    flex:1;
    min-width:250px;
}

.date-box input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid #ccc;
    font-size:18px;
    text-align:center;
    box-sizing:border-box;
}

.result{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
    text-align:center;
}
</style>

<div class="converter-container">

    <div class="date-row">

        <div class="date-box">
            <label>التاريخ الميلادي</label>
            <input type="date" id="gregorianDate">
        </div>

        <div class="date-box">
            <label>التاريخ الهجري</label>
            <input type="text" id="hijriResult" readonly>
        </div>

    </div>

    <div class="result" id="result"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/moment@2.29.4/moment.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/moment-hijri@2.1.2/moment-hijri.js"></script>

<script>

function formatDate(day, month, year){
    day = String(day).padStart(2,'0');
    month = String(month).padStart(2,'0');

    return `${day}-${month}-${year}`;
}

document.getElementById("gregorianDate").addEventListener("change", function(){

    const value = this.value;

    if(!value) return;

    // قراءة التاريخ بشكل صحيح
    const gregorian = moment(value, "YYYY-MM-DD");

    // تحويل للهجري
    const hijriDay = gregorian.format("iDD");
    const hijriMonth = gregorian.format("iMM");
    const hijriYear = gregorian.format("iYYYY");

    const hijriFormatted = formatDate(
        hijriDay,
        hijriMonth,
        hijriYear
    );

    document.getElementById("hijriResult").value = hijriFormatted;

    // عرض الميلادي بصيغة dd-mm-yyyy
    const gregorianFormatted = formatDate(
        gregorian.format("DD"),
        gregorian.format("MM"),
        gregorian.format("YYYY")
    );

    document.getElementById("result").innerHTML =
        `الميلادي: ${gregorianFormatted}<br>
         الهجري: ${hijriFormatted}`;

});

</script>
