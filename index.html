<script>
async function convertNow() {
    const input = document.getElementById('dateText').value.trim();
    const mode = document.getElementById('mode').value;
    const resBox = document.getElementById('resultBox');
    const resText = document.getElementById('resultText');

    if (!input.includes('-')) {
        alert("اكتب التاريخ: يوم-شهر-سنة");
        return;
    }

    const [day, month, year] = input.split('-');

    try {
        let url = "";

        if (mode === "GtoH") {
            // ميلادي ➜ هجري
            url = `https://api.aladhan.com/v1/gToH?date=${day}-${month}-${year}`;
        } else {
            // هجري ➜ ميلادي
            url = `https://api.aladhan.com/v1/hToG?date=${day}-${month}-${year}`;
        }

        const res = await fetch(url);
        const data = await res.json();

        if (data.code !== 200) throw new Error();

        let output = "";

        if (mode === "GtoH") {
            const h = data.data.hijri;
            output = `${h.day} / ${h.month.number} / ${h.year} هـ`;
        } else {
            const g = data.data.gregorian;
            output = `${g.day} / ${g.month.number} / ${g.year} م`;
        }

        resText.innerText = output;
        resBox.style.display = "block";

    } catch (e) {
        alert("❌ فشل الاتصال أو التاريخ غير صحيح");
    }
}
</script>
