<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>
محول التاريخ الهجري والميلادي
</title>

<link rel="preconnect"
      href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap"
      rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Cairo',sans-serif;
}

body{

    background:
    linear-gradient(135deg,#0f172a,#1e293b,#334155);

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;

    color:white;
}

.container{

    width:100%;
    max-width:950px;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(16px);

    border-radius:28px;

    padding:35px;

    box-shadow:0 15px 40px rgba(0,0,0,0.45);
}

.title{
    text-align:center;
    font-size:34px;
    font-weight:700;
    margin-bottom:35px;
}

.row{
    display:flex;
    gap:25px;
    flex-wrap:wrap;
}

.box{
    flex:1;
    min-width:300px;
}

label{
    display:block;
    margin-bottom:14px;
    font-size:20px;
    font-weight:700;
}

.date-inputs{
    display:flex;
    gap:10px;
}

.date-inputs input{
    flex:1;
    width:100%;
    padding:16px;
    border:none;
    border-radius:16px;
    outline:none;
    text-align:center;
    font-size:18px;
    font-weight:600;
    background:white;
    color:#111;
}

.buttons{
    margin-top:30px;
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

button{
    flex:1;
    padding:16px;
    border:none;
    border-radius:16px;
    font-size:19px;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
}

.btn1{
    background:#22c55e;
    color:white;
}

.btn2{
    background:#3b82f6;
    color:white;
}

.btn-copy{
    background:#f59e0b;
    color:white;
}

button:hover{
    transform:translateY(-3px);
    opacity:0.92;
}

.result{

    margin-top:30px;

    background:rgba(255,255,255,0.08);

    border-radius:22px;

    padding:28px;

    text-align:center;
}

.result h2{
    margin-bottom:18px;
    font-size:26px;
}

.result p{
    font-size:24px;
    line-height:2;
    font-weight:700;
}

/* التوقيع الاحترافي */
.footer{
    margin-top:30px;
    text-align:center;
}

.signature{
    display:inline-block;
    padding:12px 22px;
    border-radius:16px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.15);
    animation:fadeIn 1.2s ease;
}

.signature .name{
    font-size:15px;
    line-height:1.8;
    opacity:0.9;
}

.signature .name span{
    display:block;
    font-size:18px;
    font-weight:700;
    color:#38bdf8;
    letter-spacing:1px;
}

.signature .tag{
    margin-top:6px;
    font-size:13px;
    font-weight:700;
    letter-spacing:2px;
    color:#94a3b8;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
}

/* الجوال */
@media(max-width:768px){
    .container{padding:22px;}
    .title{font-size:28px;}
    .row{flex-direction:column;}
    .box{min-width:100%;}
    .date-inputs input{padding:14px;font-size:16px;}
    button{font-size:17px;}
    .result p{font-size:19px;}
}

</style>

</head>

<body>

<div class="container">

    <div class="title">
        محول التاريخ الهجري والميلادي
    </div>

    <div class="row">

        <!-- الميلادي -->
        <div class="box">

            <label>التاريخ الميلادي</label>

            <div class="date-inputs">
                <input id="gDay" placeholder="اليوم">
                <input id="gMonth" placeholder="الشهر">
                <input id="gYear" placeholder="السنة">
            </div>

        </div>

        <!-- الهجري -->
        <div class="box">

            <label>التاريخ الهجري</label>

            <div class="date-inputs">
                <input id="hDay" placeholder="اليوم">
                <input id="hMonth" placeholder="الشهر">
                <input id="hYear" placeholder="السنة">
            </div>

        </div>

    </div>

    <div class="buttons">

        <button class="btn1" onclick="convertToHijri()">تحويل إلى هجري</button>
        <button class="btn2" onclick="convertToGregorian()">تحويل إلى ميلادي</button>
        <button class="btn-copy" onclick="copyResult()">نسخ النتيجة</button>

    </div>

    <div class="result">

        <h2>النتيجة</h2>

        <p id="resultText">
            اختر التاريخ ثم اضغط تحويل
        </p>

    </div>

    <div class="footer">

        <div class="signature">

            <div class="name">
                إعداد التقني<br>
                <span>حسين بن سعيد</span>
            </div>

            <div class="tag">
                s7s_tec
            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/moment@2.29.4/moment.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/moment-hijri@2.1.2/moment-hijri.js"></script>

<script>

/* تنسيق */
function formatDate(d,m,y){
    return `${String(d).padStart(2,'0')}-${String(m).padStart(2,'0')}-${y}`;
}

/* ميلادي → هجري */
function convertToHijri(){

    let d=document.getElementById("gDay").value;
    let m=document.getElementById("gMonth").value;
    let y=document.getElementById("gYear").value;

    if(!d||!m||!y){alert("أدخل التاريخ الميلادي كاملاً");return;}

    let g=moment(`${y}-${m}-${d}`,"YYYY-MM-DD");

    let hd=g.format("iDD");
    let hm=g.format("iMM");
    let hy=g.format("iYYYY");

    document.getElementById("hDay").value=hd;
    document.getElementById("hMonth").value=hm;
    document.getElementById("hYear").value=hy;

    document.getElementById("resultText").innerHTML=
    `الميلادي: ${formatDate(d,m,y)}<br><br>الهجري: ${formatDate(hd,hm,hy)}`;
}

/* هجري → ميلادي */
function convertToGregorian(){

    let d=document.getElementById("hDay").value;
    let m=document.getElementById("hMonth").value;
    let y=document.getElementById("hYear").value;

    if(!d||!m||!y){alert("أدخل التاريخ الهجري كاملاً");return;}

    let h=moment(`${y}-${m}-${d}`,"iYYYY-iMM-iDD");

    let gd=h.format("DD");
    let gm=h.format("MM");
    let gy=h.format("YYYY");

    document.getElementById("gDay").value=gd;
    document.getElementById("gMonth").value=gm;
    document.getElementById("gYear").value=gy;

    document.getElementById("resultText").innerHTML=
    `الهجري: ${formatDate(d,m,y)}<br><br>الميلادي: ${formatDate(gd,gm,gy)}`;
}

/* نسخ النتيجة */
function copyResult(){

    let text=document.getElementById("resultText").innerText;

    if(!text || text.includes("اختر التاريخ")){
        alert("لا يوجد شيء لنسخه");
        return;
    }

    navigator.clipboard.writeText(text).then(()=>{
        alert("تم النسخ بنجاح ✔️");
    }).catch(()=>{

        let temp=document.createElement("textarea");
        temp.value=text;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        document.body.removeChild(temp);

        alert("تم النسخ ✔️");
    });
}

</script>

</body>

</html>
