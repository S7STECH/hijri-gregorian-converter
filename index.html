<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>محول التاريخ الهجري والميلادي</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/moment@2.29.4/moment.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/moment-hijri@2.1.2/moment-hijri.js"></script>

<style>

body{
    margin:0;
    font-family:'Cairo',sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:900px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(16px);
    border-radius:22px;
    padding:25px;
    box-shadow:0 20px 50px rgba(0,0,0,0.4);
}

h1{
    text-align:center;
    margin-bottom:20px;
    font-size:26px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.box{
    background:rgba(255,255,255,0.06);
    padding:15px;
    border-radius:15px;
}

label{
    display:block;
    margin-bottom:10px;
    font-weight:700;
}

.inputs{
    display:flex;
    gap:8px;
}

input{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:none;
    text-align:center;
    font-size:16px;
    outline:none;
}

.buttons{
    display:flex;
    gap:10px;
    margin-top:15px;
    flex-wrap:wrap;
}

button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:12px;
    font-weight:700;
    cursor:pointer;
}

.hijri{background:#22c55e;color:white;}
.greg{background:#3b82f6;color:white;}

.result{
    margin-top:15px;
    padding:15px;
    background:rgba(255,255,255,0.08);
    border-radius:15px;
    text-align:center;
    font-size:18px;
    line-height:2;
}

@media(max-width:768px){
    .grid{grid-template-columns:1fr;}
}

</style>

</head>

<body>

<div class="container">

<h1>محول التاريخ الهجري والميلادي</h1>

<div class="grid">

<!-- ميلادي -->
<div class="box">
<label>التاريخ الميلادي</label>
<div class="inputs">
<input id="gDay" placeholder="يوم">
<input id="gMonth" placeholder="شهر">
<input id="gYear" placeholder="سنة">
</div>
</div>

<!-- هجري -->
<div class="box">
<label>التاريخ الهجري</label>
<div class="inputs">
<input id="hDay" placeholder="يوم">
<input id="hMonth" placeholder="شهر">
<input id="hYear" placeholder="سنة">
</div>
</div>

</div>

<div class="buttons">

<button class="hijri" onclick="toHijri()">تحويل إلى هجري</button>
<button class="greg" onclick="toGregorian()">تحويل إلى ميلادي</button>

</div>

<div class="result" id="result">
أدخل التاريخ ثم اضغط تحويل
</div>

</div>

<script>

/* ميلادي → هجري */
function toHijri(){

let d=document.getElementById("gDay").value;
let m=document.getElementById("gMonth").value;
let y=document.getElementById("gYear").value;

if(!d || !m || !y){
alert("أدخل التاريخ الميلادي كاملاً");
return;
}

let date = moment(`${y}-${m}-${d}`,"YYYY-MM-DD");

let hDay = date.format("iDD");
let hMonth = date.format("iMM");
let hYear = date.format("iYYYY");

/* تعبئة الهجري (اليسار) */
document.getElementById("hDay").value = hDay;
document.getElementById("hMonth").value = hMonth;
document.getElementById("hYear").value = hYear;

/* عرض النتيجة */
document.getElementById("result").innerHTML =
`
الميلادي: ${d}-${m}-${y}
<br><br>
الهجري: ${hDay}-${hMonth}-${hYear}
`;
}

/* هجري → ميلادي (الإصلاح الأساسي هنا) */
function toGregorian(){

let d=document.getElementById("hDay").value;
let m=document.getElementById("hMonth").value;
let y=document.getElementById("hYear").value;

if(!d || !m || !y){
alert("أدخل التاريخ الهجري كاملاً");
return;
}

let date = moment(`${y}-${m}-${d}`,"iYYYY-iMM-iDD");

let gDay = date.format("DD");
let gMonth = date.format("MM");
let gYear = date.format("YYYY");

/* ⭐ هذا هو الإصلاح الذي طلبته */
document.getElementById("gDay").value = gDay;
document.getElementById("gMonth").value = gMonth;
document.getElementById("gYear").value = gYear;

/* عرض النتيجة */
document.getElementById("result").innerHTML =
`
الهجري: ${d}-${m}-${y}
<br><br>
الميلادي: ${gDay}-${gMonth}-${gYear}
`;
}

</script>

</body>
</html>
