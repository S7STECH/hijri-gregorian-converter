<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S7S Tech | المحول الدقيق</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/moment-hijri@2.1.2/moment-hijri.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --neon: #00f2fe; --dark: #020617; }
        body {
            margin: 0; background: var(--dark); color: white;
            font-family: 'Cairo', sans-serif; display: flex;
            justify-content: center; align-items: center; min-height: 100vh;
            overflow: hidden;
        }

        .bg-animate {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            z-index: -1;
        }

        .container {
            background: rgba(15, 23, 42, 0.9);
            border: 2px solid var(--neon);
            padding: 30px; border-radius: 30px;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.3);
            width: 90%; max-width: 400px; text-align: center;
        }

        h1 { font-size: 2.2rem; font-weight: 900; margin-bottom: 20px; text-shadow: 0 0 15px var(--neon); }

        .mode-selector { margin-bottom: 20px; }
        
        /* تقسيم الخانات */
        .date-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px;
        }

        .input-unit {
            background: #1e293b; border: 1px solid #334155;
            border-radius: 12px; padding: 10px;
        }

        .input-unit label { display: block; font-size: 0.7rem; color: var(--neon); margin-bottom: 5px; }

        input, select {
            width: 100%; background: transparent; border: none;
            color: white; font-family: 'Cairo'; text-align: center;
            font-size: 1.1rem; outline: none;
        }

        button {
            width: 100%; padding: 15px; border-radius: 15px; border: none;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            color: #020617; font-weight: 900; font-size: 1.2rem;
            cursor: pointer; transition: 0.3s;
        }

        #resultBox {
            margin-top: 25px; padding: 20px; border-radius: 15px;
            background: rgba(0, 242, 254, 0.1);
            border: 2px dashed var(--neon); display: none;
        }

        .res-text { font-size: 1.5rem; font-weight: 900; color: white; margin-top: 5px; }

        .signature { margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .sig-tec { color: var(--neon); font-size: 1.2rem; font-weight: bold; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="bg-animate"></div>

<div class="container">
    <h1>محول التاريخ</h1>

    <div class="mode-selector">
        <select id="convertMode">
            <option value="GtoH">ميلادي ➔ هجري</option>
            <option value="HtoG">هجري ➔ ميلادي</option>
        </select>
    </div>

    <div class="date-grid">
        <div class="input-unit">
            <label>اليوم</label>
            <input type="number" id="day" placeholder="01" min="1" max="31">
        </div>
        <div class="input-unit">
            <label>الشهر</label>
            <input type="number" id="month" placeholder="01" min="1" max="12">
        </div>
        <div class="input-unit">
            <label>السنة</label>
            <input type="number" id="year" placeholder="2026">
        </div>
    </div>

    <button onclick="startConversion()">تحويل الآن</button>

    <div id="resultBox">
        <div style="color: var(--neon); font-size: 0.9rem;">التاريخ المحول:</div>
        <div class="res-text" id="finalDate"></div>
    </div>

    <div class="signature">
        <div style="font-weight: 900;">إعداد: حسين بن سعيد</div>
        <div class="sig-tec">s7s_tec</div>
    </div>
</div>

<script>
    function startConversion() {
        const d = document.getElementById('day').value;
        const m = document.getElementById('month').value;
        const y = document.getElementById('year').value;
        const mode = document.getElementById('convertMode').value;
        const resultBox = document.getElementById('resultBox');
        const finalDate = document.getElementById('finalDate');

        if (!d || !m || !y) {
            alert("فضلاً أكمل جميع الخانات (اليوم، الشهر، السنة)");
            return;
        }

        try {
            let result = "";
            if (mode === "GtoH") {
                // من ميلادي إلى هجري
                let mDate = moment(`${y}-${m}-${d}`, 'YYYY-M-D');
                if (!mDate.isValid()) throw new Error();
                result = mDate.format('iDD / iMM / iYYYY') + " هـ";
            } else {
                // من هجري إلى ميلادي
                let hDate = moment(`${y}-${m}-${d}`, 'iYYYY-iM-iD');
                if (!hDate.isValid()) throw new Error();
                result = hDate.format('DD / MM / YYYY') + " م";
            }

            finalDate.innerText = result;
            resultBox.style.display = "block";
        } catch (e) {
            alert("التاريخ غير صحيح، تأكد من الأرقام المدخلة");
        }
    }
</script>

</body>
</html>
