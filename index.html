<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محول التاريخ | حسين بن سعيد</title>
    
    <!-- مكتبات أساسية - تأكد من الاتصال بالإنترنت -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/moment-hijri@2.1.2/moment-hijri.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a; /* اللون الداكن الذي ظهر لك في الصورة */
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: rgba(30, 41, 59, 0.9);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #00f2fe;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
            width: 350px;
            text-align: center;
            z-index: 10;
        }

        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            display: block;
            box-sizing: border-box;
        }

        button {
            background: #00f2fe;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
        }

        .result {
            margin-top: 20px;
            padding: 10px;
            border: 1px dashed #00f2fe;
            display: none;
        }

        .signature {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #94a3b8;
        }
        
        .handle { color: #00f2fe; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h3><i class="fas fa-calendar-alt"></i> محول التاريخ التقني</h3>
    
    <select id="mode">
        <option value="GtoH">من ميلادي إلى هجري</option>
        <option value="HtoG">من هجري إلى ميلادي</option>
    </select>

    <input type="text" id="dateInput" placeholder="السنة-الشهر-اليوم">
    
    <button onclick="convert()">تحويل الآن</button>

    <div id="result" class="result"></div>

    <div class="signature">
        إعداد: حسين بن سعيد <br>
        <span class="handle">s7s_tec</span>
    </div>
</div>

<script>
    function convert() {
        const input = document.getElementById('dateInput').value;
        const mode = document.getElementById('mode').value;
        const resDiv = document.getElementById('result');

        if(!input) return alert("يرجى إدخال التاريخ");

        try {
            let output = "";
            if(mode === "GtoH") {
                output = moment(input, 'YYYY-M-D').format('iYYYY-iM-iD') + " هـ";
            } else {
                output = moment(input, 'iYYYY-iM-iD').format('YYYY-M-D') + " م";
            }
            resDiv.innerHTML = "النتيجة: " + output;
            resDiv.style.display = "block";
        } catch(e) {
            alert("خطأ في التنسيق! استخدم 2026-05-06");
        }
    }
</script>

</body>
</html>
