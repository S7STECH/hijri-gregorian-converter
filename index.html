<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>محول التاريخ</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
}

/* الحاوية */
.container {
    width: 90%;
    max-width: 400px;
    padding: 25px;
    border-radius: 15px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    color: white;
    text-align: center;
}

/* العنوان */
h1 {
    margin-bottom: 20px;
}

/* المدخلات */
input, select, button {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
}

/* الزر */
button {
    background: #ffffff;
    color: #2a5298;
    cursor: pointer;
    font-weight: bold;
}

/* النتيجة */
.result {
    margin-top: 15px;
    padding: 15px;
    border-radius: 10px;
    background: rgba(255,255,255,0.2);
    display: none;
}

/* اتجاه التحويل */
.direction {
    margin-bottom: 10px;
    font-size: 14px;
    color: #ddd;
}

/* التوقيع */
.signature {
    position: fixed;
    bottom: 10px;
    width: 100%;
    text-align: center;
    font-size: 14px;
    color: rgba(255,255,255,0.7);
    font-weight: 600;
}

.signature .username {
    display: block;
    font-size: 13px;
    color: rgba(255,255,255,0.5);
}
</style>
</head>

<body>

<div class="container">
    <h1>محول التاريخ</h1>

    <!-- اختيار التاريخ -->
    <input type="date" id="datePicker">

    <!-- توضيح الاتجاه -->
    <div class="direction" id="directionText">
        التحويل: هجري → ميلادي
    </div>

    <!-- اختيار نوع التحويل -->
    <select id="mode" onchange="updateDirection()">
        <option value="HtoG">هجري إلى ميلادي</option>
        <option value="GtoH">ميلادي إلى هجري</option>
    </select>

    <button onclick="convertNow()">تحويل</button>

    <div class="result" id="resultBox">
        <span id="resultText"></span>
    </div>
</div>

<!-- التوقيع -->
<div class="signature">
    إعداد: حسين بن سعيد
    <span class="username">@s7s_tec</span>
</div>

<script>
function updateDirection() {
    const mode = document.getElementById('mode').value;
    const text = document.getElementById('directionText');

    if (mode === "HtoG") {
        text.innerText = "التحويل: هجري → ميلادي";
    } else {
        text.innerText = "التحويل: ميلادي → هجري";
    }
}

async function convertNow() {
    const dateValue = document.getElementById('datePicker').value;
    const mode = document.getElementById('mode').value;
    const resBox = document.getElementById('resultBox');
    const resText = document.getElementById('resultText');

    if (!dateValue) {
        alert("اختر التاريخ أولاً");
        return;
    }

    const [year, month, day] = dateValue.split('-');

    let url = mode === "GtoH"
        ? `https://api.aladhan.com/v1/gToH?date=${day}-${month}-${year}`
        : `https://api.aladhan.com/v1/hToG?date=${day}-${month}-${year}`;

    try {
        resText.innerText = "جاري التحويل...";
        resBox.style.display = "block";

        const res = await fetch(url);
        const data = await res.json();

        if (!data || data.code !== 200) {
            throw new Error();
        }

        let output = "";

        if (mode === "GtoH") {
            const h = data.data.hijri;
            output = `${h.day} ${h.month.ar} ${h.year} هـ`;
        } else {
            const g = data.data.gregorian;
            output = `${g.day} ${g.month.en} ${g.year} م`;
        }

        resText.innerText = output;

    } catch (e) {
        resText.innerText = "فشل التحويل، تحقق من التاريخ أو الاتصال";
    }
}
</script>

</body>
</html>
