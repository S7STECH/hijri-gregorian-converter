<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S7S Tech | محول التاريخ الاحترافي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;900&display=swap" rel="stylesheet">
    <!-- مكتبات moment المحدثة لضبط التاريخ الهجري -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/moment-hijri@2.1.2/moment-hijri.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --neon: #00f2fe; --dark: #020617; }
        body {
            margin: 0; background: var(--dark); color: white;
            font-family: 'Cairo', sans-serif; display: flex;
            justify-content: center; align-items: center; min-height: 100vh;
            overflow: hidden;
        }

        .container {
            background: rgba(15, 23, 42, 0.95);
            border: 2px solid var(--neon);
            padding: 30px; border-radius: 30px;
            box-shadow: 0 0 40px rgba(0, 242, 254, 0.3);
            width: 90%; max-width: 400px; text-align: center;
            position: relative; z-index: 10;
        }

        h1 { font-size: 2.2rem; font-weight: 900; margin-bottom: 20px; text-shadow: 0 0 15px var(--neon); }

        .input-box {
            background: #1e293b; border: 1px solid #334155;
            border-radius: 15px; padding: 12px; margin-bottom: 15px;
        }

        label { display: block; text-align: right; font-size: 0.85rem; color: var(--neon); margin-bottom: 5px; }

        input, select {
            width: 100%; background: transparent; border: none;
            color: white; font-family: 'Cairo'; text-align: center;
            font-size: 1.1rem; outline: none; box-sizing: border-box;
        }

        button {
            width: 100%; padding: 15px; border-radius: 15px; border: none;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            color: #020617; font-weight: 900; font-size: 1.2rem;
            cursor: pointer; transition: 0.3s;
        }

        button:hover { transform: translateY(-3px); box-shadow: 0 5px 20px var(--neon); }

        #resultBox {
            margin-top: 25px; padding: 20px; border-radius: 15px;
            background: rgba(0, 242, 254, 0.1); border: 2px solid var(--neon);
            display: none;
        }

        .res-val { font-size: 1.6rem; font-weight: 900; color: white; }

        .signature { margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        .sig-tec { color: var(--neon); font-size: 1.3rem; font-weight: bold; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="container">
    <h1>محول التاريخ</h1>

    <div class="input-box">
        <label>إعدادات التحويل</label>
        <select id="mode">
            <option value="GtoH">من ميلادي ➔ إلى هجري</option>
            <option value="HtoG">من هجري ➔ إلى ميلادي</option>
        </select>
    </div>

    <div class="input-box">
        <label>التاريخ (يوم-شهر-سنة)</label>
        <input type="text" id="dateText" placeholder="مثال: 15-05-1447" dir="ltr">
    </div>

    <button onclick="convertNow()">تحويل الآن</button>

    <div id="resultBox">
        <div style="color: var(--neon); margin-bottom: 5px;">النتيجة:</div>
        <div class="res-val" id="resultText"></div>
    </div>

    <div class="signature">
        <div style="font-weight: 900;">إعداد: حسين بن سعيد</div>
        <div class="sig-tec">s7s_tec</div>
    </div>
</div>

<script>
    function convertNow() {
        const input = document.getElementById('dateText').value;
        const mode = document.getElementById('mode').value;
        const resBox = document.getElementById('resultBox');
        const resText = document.getElementById('resultText');

        if (!input.includes('-')) {
            alert("يرجى كتابة التاريخ بهذا الشكل: 18-11-1447");
            return;
        }

        try {
            const p = input.split('-');
            // ترتيب التاريخ البرمجي: السنة-الشهر-اليوم
            const standardDate = p[2] + "-" + p[1] + "-" + p[0]; 

            let output = "";
            if (mode === "GtoH") {
                // ميلادي إلى هجري
                output = moment(standardDate, 'YYYY-M-D').format('iDD / iMM / iYYYY') + " هـ";
            } else {
                // هجري إلى ميلادي (تعديل المنطق لتقويم أم القرى)
                output = moment(standardDate, 'iYYYY-iM-iD').format('DD / MM / YYYY') + " م";
            }

            if (output.includes("Invalid")) throw new Error();
            
            resText.innerText = output;
            resBox.style.display = "block";
        } catch (e) {
            alert("تأكد من صحة التاريخ المدخل (يوم-شهر-سنة)");
        }
    }
</script>

</body>
</html>
