<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S7S Tech | محول التاريخ الدقيق</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/moment-hijri@2.1.2/moment-hijri.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --neon: #00f2fe; --dark: #020617; }
        body {
            margin: 0; background: var(--dark); color: white;
            font-family: 'Cairo', sans-serif; display: flex;
            justify-content: center; align-items: center; min-height: 100vh;
            overflow: hidden;
        }

        /* خلفية تقنية متطورة */
        .bg-lines {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,242,254,0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,242,254,0.05) 1px, transparent 1px);
            background-size: 40px 40px; z-index: -1;
        }

        .container {
            background: rgba(15, 23, 42, 0.95);
            border: 2px solid var(--neon);
            padding: 35px; border-radius: 30px;
            box-shadow: 0 0 40px rgba(0, 242, 254, 0.2);
            width: 90%; max-width: 420px; text-align: center;
        }

        h1 { 
            font-size: 2.5rem; font-weight: 900; margin-bottom: 30px;
            text-shadow: 0 0 20px var(--neon); color: #fff;
        }

        .input-box {
            background: #1e293b; border: 1px solid #334155;
            border-radius: 15px; padding: 10px; margin-bottom: 15px;
        }

        label { display: block; text-align: right; font-size: 0.8rem; color: var(--neon); margin-right: 10px; }

        select, input {
            width: 100%; background: transparent; border: none;
            color: white; padding: 10px; font-family: 'Cairo';
            font-size: 1.1rem; outline: none; box-sizing: border-box;
        }

        button {
            width: 100%; padding: 15px; border-radius: 15px; border: none;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            color: #020617; font-weight: 900; font-size: 1.2rem;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }

        button:hover { transform: scale(1.02); box-shadow: 0 0 25px var(--neon); }

        #resultArea {
            margin-top: 25px; padding: 20px; border-radius: 15px;
            background: rgba(0, 242, 254, 0.05);
            border: 1px solid var(--neon); display: none;
            animation: fadeIn 0.5s ease;
        }

        .res-val { font-size: 1.6rem; font-weight: 900; color: var(--neon); }

        .signature { margin-top: 40px; border-top: 1px solid #334155; padding-top: 20px; }
        .sig-name { font-weight: 900; font-size: 1.2rem; display: block; }
        .sig-tec { color: var(--neon); letter-spacing: 3px; font-size: 1.1rem; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="bg-lines"></div>

<div class="container">
    <h1>محول التاريخ</h1>

    <div class="input-box">
        <label>نوع التحويل</label>
        <select id="type">
            <option value="HtoG">من هجري ➔ إلى ميلادي</option>
            <option value="GtoH">من ميلادي ➔ إلى هجري</option>
        </select>
    </div>

    <div class="input-box">
        <label>أدخل التاريخ (يوم-شهر-سنة)</label>
        <input type="text" id="dateInput" placeholder="مثال: 01-01-1445" style="text-align: center;">
    </div>

    <button onclick="execute()">
        <i class="fas fa-bolt"></i> تحويل الآن
    </button>

    <div id="resultArea">
        <div style="font-size: 0.9rem; margin-bottom: 5px;">النتيجة التقنية:</div>
        <div class="res-val" id="finalRes"></div>
    </div>

    <div class="signature">
        <span class="sig-name">إعداد: حسين بن سعيد</span>
        <span class="sig-tec">s7s_tec</span>
    </div>
</div>

<script>
    function execute() {
        const input = document.getElementById('dateInput').value;
        const type = document.getElementById('type').value;
        const resBox = document.getElementById('resultArea');
        const resText = document.getElementById('finalRes');

        if (!input || !input.includes('-')) {
            alert("يرجى إدخال التاريخ بتنسيق صحيح (يوم-شهر-سنة) مثال: 25-12-2023");
            return;
        }

        try {
            // تقسيم التاريخ المدخل للتأكد من القراءة الصحيحة
            const parts = input.split('-');
            const formattedInput = `${parts[2]}-${parts[1]}-${parts[0]}`; // تحويل لـ YYYY-MM-DD

            let result = "";
            if (type === "GtoH") {
                // من ميلادي لهجري
                result = moment(formattedInput, 'YYYY-MM-DD').format('iDD / iMM / iYYYY') + " هـ";
            } else {
                // من هجري لميلادي
                result = moment(formattedInput, 'iYYYY-iMM-iDD').format('DD / MM / YYYY') + " م";
            }

            if (result.includes("Invalid")) throw new Error();

            resText.innerText = result;
            resBox.style.display = "block";
        } catch (e) {
            alert("خطأ! تأكد من أن التاريخ المدخل منطقي (مثلاً لا يوجد شهر 13)");
        }
    }
</script>

</body>
</html>
