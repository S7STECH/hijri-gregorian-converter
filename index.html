<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محول التاريخ التقني | s7s_tec</title>
    <!-- استدعاء مكتبة التواريخ الهجرية -->
    <script src="https://cdn.jsdelivr.net/npm/moment@2.29.4/moment.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/moment-hijri@2.1.2/moment-hijri.min.js"></script>
    <!-- أيقونات FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #00f2fe;
            --secondary-color: #4facfe;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-dark);
            background-image: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* خلفية تقنية متحركة */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: linear-gradient(rgba(0, 242, 254, 0.05) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0, 242, 254, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            animation: grid-move 20s linear infinite;
            z-index: -1;
        }

        @keyframes grid-move {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            padding: 2.5rem;
            border-radius: 20px;
            border: 1px solid rgba(0, 242, 254, 0.3);
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.2);
            width: 100%;
            max-width: 450px;
            text-align: center;
            position: relative;
        }

        h2 {
            margin-bottom: 1.5rem;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: right;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
        }

        .btn-convert {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, var(--secondary-color), var(--primary-color));
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-convert:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.4);
        }

        .result-box {
            margin-top: 2rem;
            padding: 15px;
            border-radius: 10px;
            background: rgba(0, 242, 254, 0.1);
            border: 1px dashed var(--primary-color);
            display: none;
        }

        /* التوقيع */
        .signature {
            margin-top: 2.5rem;
            border-top: 1px solid rgba(148, 163, 184, 0.2);
            padding-top: 1rem;
        }

        .signature p {
            margin: 5px 0;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .signature .name {
            font-weight: bold;
            color: white;
            letter-spacing: 1px;
        }

        .signature .handle {
            color: var(--primary-color);
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2><i class="fa-solid fa-microchip"></i> محول التواريخ</h2>
    
    <div class="input-group">
        <label>نوع التحويل</label>
        <select id="convertType">
            <option value="toHijri">من ميلادي إلى هجري</option>
            <option value="toGregorian">من هجري إلى ميلادي</option>
        </select>
    </div>

    <div class="input-group">
        <label>اختر التاريخ</label>
        <input type="date" id="dateInput">
    </div>

    <button class="btn-convert" onclick="convertDate()">
        <i class="fa-solid fa-sync-alt"></i> تحويـل الآن
    </button>

    <div id="result" class="result-box">
        <span id="resultText"></span>
    </div>

    <!-- توقيع إعداد حسين بن سعيد -->
    <div class="signature">
        <p class="name">إعداد: حسين بن سعيد</p>
        <p class="handle">s7s_tec <i class="fa-solid fa-code"></i></p>
    </div>
</div>

<script>
    function convertDate() {
        const dateVal = document.getElementById('dateInput').value;
        const type = document.getElementById('convertType').value;
        const resultBox = document.getElementById('result');
        const resultText = document.getElementById('resultText');

        if (!dateVal) {
            alert("يرجى اختيار التاريخ أولاً");
            return;
        }

        let formattedResult = "";
        
        if (type === "toHijri") {
            // تحويل لميلادي لهجري باستخدام Moment Hijri
            formattedResult = moment(dateVal, 'YYYY-MM-DD').format('iYYYY/iMM/iDD') + " هـ";
        } else {
            // تحويل هجري لميلادي (تبسيطاً نستخدم المكتبة)
            formattedResult = moment(dateVal, 'YYYY-MM-DD').format('YYYY/MM/DD') + " م";
        }

        resultText.innerHTML = `<strong>النتيجة:</strong> ${formattedResult}`;
        resultBox.style.display = "block";
    }
</script>

</body>
</html>
